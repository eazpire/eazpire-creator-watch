# Copy Play signing secrets from this repo to Wear Player mirror repos.
# Run manually: Actions → "Propagate Play secrets to Wear mirrors" → Run workflow
#
# Requires: PLAY_SERVICE_ACCOUNT_JSON + ANDROID_KEYSTORE_* secrets on THIS repo
# Token: repository secret WEAR_REPO_PUSH_TOKEN or ANDROID_REPO_PUSH_TOKEN (repo scope + secrets:write on wear mirrors)

name: Propagate Play secrets to Wear mirrors

on:
  workflow_dispatch:

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - name: Copy secrets to eazpire-wear-android and eazpire-wear-os
        env:
          GH_TOKEN: ${{ secrets.WEAR_REPO_PUSH_TOKEN || secrets.ANDROID_REPO_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=""
          for name in PLAY_JSON KS_B64 KS_PASS KS_ALIAS KEY_PASS; do
            eval "val=\$$name"
            if [ -z "$val" ]; then missing="$missing $name"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets on this repo:$missing"
            exit 1
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set WEAR_REPO_PUSH_TOKEN or ANDROID_REPO_PUSH_TOKEN on this repo"
            exit 1
          fi
          for repo in eazpire-wear-android eazpire-wear-os; do
            echo "=== eazpire/$repo ==="
            echo "$PLAY_JSON" | gh secret set PLAY_SERVICE_ACCOUNT_JSON -R "eazpire/$repo"
            echo "$KS_B64" | gh secret set ANDROID_KEYSTORE_BASE64 -R "eazpire/$repo"
            echo "$KS_PASS" | gh secret set ANDROID_KEYSTORE_PASSWORD -R "eazpire/$repo"
            echo "$KS_ALIAS" | gh secret set ANDROID_KEY_ALIAS -R "eazpire/$repo"
            echo "$KEY_PASS" | gh secret set ANDROID_KEY_PASSWORD -R "eazpire/$repo"
            gh variable set ENABLE_GOOGLE_PLAY --body "true" -R "eazpire/$repo" || true
            if [ "$repo" = "eazpire-wear-os" ]; then
              gh variable set PLAY_DEFAULT_TRACK --body "wear:qa" -R "eazpire/$repo" || true
            else
              gh variable set PLAY_DEFAULT_TRACK --body "internal" -R "eazpire/$repo" || true
            fi
            echo "OK: secrets copied to $repo"
          done

      - name: Dispatch Google Play upload (wear-android)
        env:
          GH_TOKEN: ${{ secrets.WEAR_REPO_PUSH_TOKEN || secrets.ANDROID_REPO_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Google Play (AAB)" -R eazpire/eazpire-wear-android --ref main -f track=internal || true
          gh workflow run "Google Play (AAB)" -R eazpire/eazpire-wear-os --ref main -f track=wear:qa || true
